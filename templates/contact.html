{% extends "base.html" %}
{% block title %}Contact | Etarnity Background Remover{% endblock %}

{% block content %}
<section class="mx-auto max-w-5xl px-4 py-16 sm:px-6 md:py-20">
    <div
        class="rounded-[32px] border border-orange-100 bg-white p-8 shadow-sm transition-all duration-500 hover:-translate-y-1 hover:shadow-xl md:p-10">
        <span
            class="inline-flex rounded-full bg-orange-100 px-4 py-1.5 text-sm font-medium text-orange-700 transition-all duration-300 hover:scale-105 hover:bg-orange-200">
            Contact
        </span>

        <h1
            class="mt-6 text-4xl font-black tracking-tight text-slate-900 transition-all duration-500 hover:text-orange-600 md:text-5xl">
            Let’s get in touch
        </h1>

        <p class="mt-6 max-w-2xl text-lg leading-8 text-slate-600 transition-all duration-300">
            If you have product feedback, support requests, or business inquiries, contact us anytime.
        </p>

        <div
            class="mt-8 rounded-3xl border border-orange-100 bg-orange-50 p-6 transition-all duration-300 hover:-translate-y-2 hover:scale-[1.01] hover:bg-white hover:shadow-lg">
            <p class="text-sm font-medium text-slate-500">Support Email</p>
            <p class="mt-2 text-lg font-semibold text-slate-900 transition-colors duration-300 hover:text-orange-600">
                your@email.com</p>
        </div>
    </div>
</section>
{% endblock %}
